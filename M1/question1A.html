<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question 1A - Marungko Interactive Chalkboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <style>
        /* Internal styles removed - now using unified framework in style.css */
    </style>
</head>

<body>
    <a class="index-return-btn" href="../index.html" data-transition-direction="back" aria-label="Return to index" title="Return">Return</a>
    <div class="frame">
        <div class="chalkboard">
            <div class="logo-placeholder">
                <img src="../images/decode.png" alt="Logo">
            </div>
            <div class="doodle-layer" aria-hidden="true">
                <span class="doodle cloud" style="--x: 12%; --y: 18%; --w: 180px; --h: 80px; --t: 28s;"></span>
                <span class="doodle cloud" style="--x: 70%; --y: 12%; --w: 160px; --h: 70px; --t: 26s;"></span>
                <span class="doodle cloud" style="--x: 86%; --y: 62%; --w: 200px; --h: 90px; --t: 30s;"></span>
                <span class="doodle blob" style="--x: 20%; --y: 70%; --w: 140px; --h: 100px; --t: 24s;"></span>
                <span class="doodle blob" style="--x: 56%; --y: 36%; --w: 120px; --h: 90px; --t: 22s;"></span>
            </div>

            <!-- Question 1A Screen -->
            <div id="question1A" class="screen active lesson-screen">
                <div class="lesson-header-row">
                    <p class="lesson-heading">Piliin ang <span class="highlight-yellow">huling</span> tunog ng<br>mga sumusunod na larawan.</p>
                </div>
                <div class="lesson-content-row">
                    <div class="lesson-key-area">
                        <div class="lesson-question-card">
                            <div class="lesson-question-badge">&#10067;</div>
                            <img class="lesson-key-img" src="../images/karayom.png" alt="Karayom">
                        </div>
                    </div>
                    <div class="lesson-choices-row" id="choicesContainer"></div>
                </div>
                <div class="lesson-feedback-panel" id="feedbackPanel">
                    <div class="icon" id="feedbackIcon"></div>
                    <div class="title" id="feedbackTitle"></div>
                    <div class="sub-text" id="feedbackSub"></div>
                </div>
                <div class="home-btn" role="button" tabindex="0" onclick="navigateToMainPage('page8')"
                    onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();navigateToMainPage('page8');}"
                    title="Back to Main">
                    <img src="../images/arrow-backward.png" alt="Back">
                </div>
            </div>
            <audio id="sfx-correct" src="../audio/correct.mp3" preload="auto"></audio>
            <audio id="sfx-wrong" src="../audio/wrong.mp3" preload="auto"></audio>
        </div>
    </div>
    <script>
        const correctAnswer = 'm';
        const allLetters = ['a', 's', 'm'];
        let currentChoices = [];

        function initializeChoices() {
            let choices = [correctAnswer];
            let otherLetters = allLetters.filter((l) => l !== correctAnswer);

            while (choices.length < 3) {
                const randomIndex = Math.floor(Math.random() * otherLetters.length);
                const selected = otherLetters.splice(randomIndex, 1)[0];
                choices.push(selected);
            }

            currentChoices = choices.sort(() => Math.random() - 0.5);
            const choicesContainer = document.getElementById('choicesContainer');
            choicesContainer.innerHTML = '';
            const colorMap = { a: 'orange', s: 'yellow', m: 'green' };

            currentChoices.forEach((letter) => {
                const circle = document.createElement('div');
                circle.className = `lesson-choice-circle ${colorMap[letter]}${letter === correctAnswer ? ' correct' : ''}`;
                circle.onclick = () => checkAnswer(circle, letter === correctAnswer);
                circle.innerHTML = `<div class="letter"><span>${letter}</span></div>`;
                choicesContainer.appendChild(circle);
            });
        }

        function checkAnswer(el, isCorrect) {
            const panel = document.getElementById('feedbackPanel');
            const icon = document.getElementById('feedbackIcon');
            const title = document.getElementById('feedbackTitle');
            const sub = document.getElementById('feedbackSub');

            const sfx = document.getElementById(isCorrect ? 'sfx-correct' : 'sfx-wrong');
            sfx.currentTime = 0;
            sfx.play().catch(() => {});

            if (isCorrect) {
                localStorage.setItem('m1_q1a_done', '1');
                localStorage.removeItem('m1_q1a_wrong');
                panel.className = 'lesson-feedback-panel show correct';
                icon.textContent = String.fromCodePoint(0x1f31f);
                title.textContent = 'Tama!';
                sub.textContent = 'Napakagaling mo!';
                el.style.outline = '6px solid #2ecc71';
                el.style.filter = 'brightness(1.15)';
            } else {
                localStorage.setItem('m1_q1a_wrong', '1');
                localStorage.removeItem('m1_q1a_done');
                panel.className = 'lesson-feedback-panel show wrong';
                icon.textContent = String.fromCodePoint(0x1f60a);
                title.textContent = 'Subukan Muli!';
                sub.textContent = 'Kaya mo yan, try ulit!';
                el.style.outline = '6px solid #e74c3c';
                el.style.filter = 'brightness(0.85)';
            }

            setTimeout(() => {
                panel.className = 'lesson-feedback-panel';
                el.style.outline = 'none';
                el.style.filter = 'none';
                navigateToMainPage('page8');
            }, 1800);
        }

        document.addEventListener('DOMContentLoaded', initializeChoices);
    </script>
</body>

</html>
