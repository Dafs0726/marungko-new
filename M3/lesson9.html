<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 9 - Marungko</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <a class="index-return-btn" href="../index.html" data-transition-direction="back" aria-label="Return to index" title="Return">Return</a>
    <div class="frame">
        <div class="chalkboard">

            <!-- DECODE Logo top right -->
            <div class="logo-placeholder">
                <img src="../images/decode.png" alt="Logo">
            </div>
            <div class="doodle-layer" aria-hidden="true">
                <span class="doodle cloud" style="--x: 12%; --y: 18%; --w: 180px; --h: 80px; --t: 28s;"></span>
                <span class="doodle cloud" style="--x: 70%; --y: 12%; --w: 160px; --h: 70px; --t: 26s;"></span>
                <span class="doodle cloud" style="--x: 86%; --y: 62%; --w: 200px; --h: 90px; --t: 30s;"></span>
                <span class="doodle blob" style="--x: 20%; --y: 70%; --w: 140px; --h: 100px; --t: 24s;"></span>
                <span class="doodle blob" style="--x: 56%; --y: 36%; --w: 120px; --h: 90px; --t: 22s;"></span>
                <span class="doodle sparkle" style="--x: 32%; --y: 22%; --size: 16px; --t: 5.5s;"></span>
                <span class="doodle sparkle" style="--x: 62%; --y: 18%; --size: 12px; --t: 6.5s;"></span>
                <span class="doodle sparkle" style="--x: 78%; --y: 40%; --size: 14px; --t: 7s;"></span>
                <span class="doodle sparkle" style="--x: 42%; --y: 80%; --size: 10px; --t: 6s;"></span>
            </div>

            <!-- Lesson 9 Screen -->
            <div id="lesson9" class="screen active lesson-screen">

                <!-- Top row: sentence + speaker icon -->
                <div class="lesson-header-row">
                    <!-- Cartoonish speaker SVG button -->
                    <svg class="lesson-speaker-btn" id="l9-speaker" viewBox="0 0 100 100"
                        xmlns="http://www.w3.org/2000/svg" role="button" tabindex="0" aria-label="Play sentence audio" title="Pakinggan">
                        <rect x="6" y="36" width="26" height="28" rx="7" ry="7" fill="#FFFDE7" stroke="#8D6E63"
                            stroke-width="3" />
                        <polygon points="32,29 62,12 62,88 32,71" fill="#FFE0B2" stroke="#8D6E63" stroke-width="3" />
                        <ellipse cx="16" cy="43" rx="5" ry="3" fill="rgba(255,255,255,0.6)"
                            transform="rotate(-10,16,43)" />
                        <path d="M69,36 Q80,50 69,64" fill="none" stroke="#FFF9C4" stroke-width="5.5"
                            stroke-linecap="round" />
                        <path d="M76,26 Q93,50 76,74" fill="none" stroke="#FFE082" stroke-width="5"
                            stroke-linecap="round" />
                    </svg>
                    <p class="lesson-heading">Kay Ate ang Manika.</p>
                    <div class="header-spacer"></div>
                </div>

                <!-- Image choices -->
                <div class="lesson-choices-row">

                    <!-- a. Gitara Kuya (wrong) -->
                    <div class="lesson-choice-card" data-correct="false" role="button" tabindex="0">
                        <div class="label">a.</div>
                        <img src="../images/gitara_kuya.png" alt="Gitara Kuya">
                    </div>

                    <!-- b. Manika Ate (CORRECT) -->
                    <div class="lesson-choice-card" data-correct="true" role="button" tabindex="0">
                        <div class="label">b.</div>
                        <img src="../images/manika_ate.png" alt="Manika Ate">
                    </div>

                    <!-- c. Nanay Bakya (wrong) -->
                    <div class="lesson-choice-card" data-correct="false" role="button" tabindex="0">
                        <div class="label">c.</div>
                        <img src="../images/nanay_bakya.png" alt="Nanay Bakya">
                    </div>

                    <!-- d. Biboy Bola (wrong) -->
                    <div class="lesson-choice-card" data-correct="false" role="button" tabindex="0">
                        <div class="label">d.</div>
                        <img src="../images/biboy_bola.png" alt="Biboy Bola">
                    </div>

                </div>

                <!-- Feedback panel -->
                <div class="lesson-feedback-panel" id="l9-feedback-panel" role="status" aria-live="polite">
                    <button class="feedback-close-btn" id="l9-feedback-close" aria-label="Close feedback">&times;</button>
                    <div class="icon" id="l9-feedback-icon"></div>
                    <div class="title" id="l9-feedback-title"></div>
                    <div class="sub-text" id="l9-feedback-sub"></div>
                </div>

                <!-- Home button (bottom right) -->
                <div class="home-btn" data-target="dafs.html#page14" data-direction="back" title="Go back to lesson menu" role="button" tabindex="0" aria-label="Go back to lesson menu">
                    <img src="../images/arrow-backward.png" alt="Back">
                </div>

            </div>

            <!-- Sound effects -->
            <audio id="sfx-correct" src="../audio/correct.mp3" preload="auto"></audio>
            <audio id="sfx-wrong" src="../audio/wrong.mp3" preload="auto"></audio>
            <audio id="sfx-sentence" src="../audio/Kay_ate_ang_manika.m4a" preload="auto"></audio>

        </div>
    </div>
    <script>
        (() => {
            const LESSON_KEY = 'lesson9';
            const RETURN_URL = 'dafs.html#page14';
            const RETURN_DIRECTION = 'back';
            const FEEDBACK_DURATION_MS = 1800;
            let answerLocked = false;

            const panel = document.getElementById('l9-feedback-panel');
            const icon = document.getElementById('l9-feedback-icon');
            const title = document.getElementById('l9-feedback-title');
            const sub = document.getElementById('l9-feedback-sub');
            const choices = Array.from(document.querySelectorAll('.lesson-choice-card'));
            const navBtn = document.querySelector('.home-btn');
            const speakerBtn = document.getElementById('l9-speaker');
            const sentenceAudio = document.getElementById('sfx-sentence');

            function safeNavigate(url, direction) {
                if (!url) return;
                if (typeof window.navigateWithSlide === 'function') {
                    window.navigateWithSlide(url, direction);
                    return;
                }
                window.location.href = url;
            }

            function persistLessonState(isCorrect) {
                try {
                    if (isCorrect) {
                        localStorage.setItem(`${LESSON_KEY}_done`, '1');
                        localStorage.removeItem(`${LESSON_KEY}_wrong`);
                    } else {
                        localStorage.setItem(`${LESSON_KEY}_wrong`, '1');
                        localStorage.removeItem(`${LESSON_KEY}_done`);
                    }
                } catch (error) {
                    console.warn('Could not save lesson progress:', error);
                }
            }

            function playFeedbackSfx(isCorrect) {
                const sfx = document.getElementById(isCorrect ? 'sfx-correct' : 'sfx-wrong');
                if (!sfx) return;

                sfx.currentTime = 0;
                const playPromise = sfx.play();
                if (playPromise && typeof playPromise.catch === 'function') {
                    playPromise.catch(() => { });
                }
            }

            function clearChoiceStyles() {
                choices.forEach(choice => {
                    choice.style.outline = 'none';
                    choice.style.filter = 'none';
                });
            }

            function showFeedback(el, isCorrect) {
                if (!el) return;

                if (panel && icon && title && sub) {
                    panel.className = `lesson-feedback-panel show ${isCorrect ? 'correct' : 'wrong'}`;
                    icon.textContent = isCorrect ? String.fromCodePoint(0x1f31f) : String.fromCodePoint(0x1f60a);
                    title.textContent = isCorrect ? 'Tama!' : 'Subukan Muli!';
                    sub.textContent = isCorrect ? 'Napakagaling mo!' : 'Kaya mo yan, try ulit!';
                }

                el.style.outline = isCorrect ? '6px solid #2ecc71' : '6px solid #e74c3c';
                el.style.filter = isCorrect ? 'brightness(1.15)' : 'brightness(0.85)';
            }

            function playSentenceAudio() {
                if (!sentenceAudio || !speakerBtn) return;

                sentenceAudio.currentTime = 0;
                const playPromise = sentenceAudio.play();
                if (playPromise && typeof playPromise.catch === 'function') {
                    playPromise.catch(() => { });
                }

                speakerBtn.classList.add('playing');
                sentenceAudio.onended = () => speakerBtn.classList.remove('playing');
            }

            function closeFeedback(el, isCorrect) {
                if (panel) {
                    panel.classList.remove('show');
                }
                el.style.outline = 'none';
                el.style.filter = 'none';
                persistLessonState(isCorrect);
                safeNavigate(RETURN_URL, RETURN_DIRECTION);
            }

            function handleAnswer(el, isCorrect) {
                if (answerLocked || !el) return;
                answerLocked = true;

                clearChoiceStyles();
                playFeedbackSfx(isCorrect);
                showFeedback(el, isCorrect);

                // Bind close button
                const closeBtn = document.getElementById('l9-feedback-close');
                if (closeBtn) {
                    closeBtn.onclick = () => closeFeedback(el, isCorrect);
                }
            }

            function bindActivate(target, callback) {
                if (!target || typeof callback !== 'function') return;
                target.addEventListener('click', callback);
                target.addEventListener('keydown', event => {
                    if (event.key === 'Enter' || event.key === ' ') {
                        event.preventDefault();
                        callback();
                    }
                });
            }

            choices.forEach(choice => {
                bindActivate(choice, () => {
                    const isCorrect = choice.dataset.correct === 'true';
                    handleAnswer(choice, isCorrect);
                });
            });

            bindActivate(navBtn, () => {
                const targetUrl = navBtn && navBtn.dataset ? navBtn.dataset.target : '';
                const direction = navBtn && navBtn.dataset ? navBtn.dataset.direction : RETURN_DIRECTION;
                safeNavigate(targetUrl || RETURN_URL, direction || RETURN_DIRECTION);
            });

            bindActivate(speakerBtn, playSentenceAudio);
            window.playSentenceAudio = playSentenceAudio;

            window.checkAnswer = (el, isCorrect) => {
                handleAnswer(el, Boolean(isCorrect));
            };
        })();
    </script>
</body>

</html>
