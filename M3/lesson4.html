<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 4 - Marungko Interactive Chalkboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body class="m3-three-choice">
    <a class="index-return-btn" href="../index.html" data-transition-direction="back" aria-label="Return to index" title="Return">Return</a>
    <div class="frame">
        <div class="chalkboard">

            <!-- DECODE Logo top right -->
            <div class="logo-placeholder">
                <img src="../images/decode.png" alt="Logo">
            </div>
            <div class="doodle-layer" aria-hidden="true">
                <span class="doodle cloud" style="--x: 12%; --y: 18%; --w: 180px; --h: 80px; --t: 28s;"></span>
                <span class="doodle cloud" style="--x: 70%; --y: 12%; --w: 160px; --h: 70px; --t: 26s;"></span>
                <span class="doodle cloud" style="--x: 86%; --y: 62%; --w: 200px; --h: 90px; --t: 30s;"></span>
                <span class="doodle blob" style="--x: 20%; --y: 70%; --w: 140px; --h: 100px; --t: 24s;"></span>
                <span class="doodle blob" style="--x: 56%; --y: 36%; --w: 120px; --h: 90px; --t: 22s;"></span>
                <span class="doodle sparkle" style="--x: 32%; --y: 22%; --size: 16px; --t: 5.5s;"></span>
                <span class="doodle sparkle" style="--x: 62%; --y: 18%; --size: 12px; --t: 6.5s;"></span>
                <span class="doodle sparkle" style="--x: 78%; --y: 40%; --size: 14px; --t: 7s;"></span>
                <span class="doodle sparkle" style="--x: 42%; --y: 80%; --size: 10px; --t: 6s;"></span>
            </div>

            <!-- Lesson 4 Screen -->
            <div id="lesson4" class="screen active lesson-screen">

                <!-- Instruction text -->
                <div class="lesson-header-row">
                    <p class="lesson-heading">
                        Piliin ang <span class="highlight-yellow">unang</span> tunog<br>ng mga sumusunod na<br>larawan.
                    </p>
                </div>

                <!-- Content row: key image + answer choices -->
                <div class="lesson-content-row">

                    <!-- Key image in question card -->
                    <div class="lesson-key-area">
                        <div class="lesson-question-card">
                            <div class="lesson-question-badge">&#10067;</div>
                            <img class="lesson-key-img lesson-key-img--lapis" src="../images/lapis.png"
                                alt="Lapis (Pencil)">
                        </div>
                    </div>

                    <!-- Answer circles -->
                    <div class="lesson-choices-row">

                        <!-- Circle T (wrong) -->
                        <div class="lesson-choice-circle orange" data-correct="false" role="button" tabindex="0" title="t">
                            <div class="letter"><span>t</span></div>
                        </div>

                        <!-- Circle S (wrong) -->
                        <div class="lesson-choice-circle green" data-correct="false" role="button" tabindex="0" title="s">
                            <div class="letter"><span>s</span></div>
                        </div>

                        <!-- Circle L (correct) -->
                        <div class="lesson-choice-circle yellow" data-correct="true" role="button" tabindex="0" title="l">
                            <div class="letter"><span>l</span></div>
                        </div>

                    </div>
                </div>

                <!-- Feedback panel -->
                <div class="lesson-feedback-panel" id="l1-feedback-panel" role="status" aria-live="polite">
                    <button class="feedback-close-btn" id="l1-feedback-close" aria-label="Close feedback">&times;</button>
                    <div class="icon" id="l1-feedback-icon"></div>
                    <div class="title" id="l1-feedback-title"></div>
                    <div class="sub-text" id="l1-feedback-sub"></div>
                </div>

                <!-- Home button (bottom right) -->
                <div class="home-btn" data-target="dafs.html#page11" data-direction="back" title="Go back to lesson menu" role="button" tabindex="0" aria-label="Go back to lesson menu">
                    <img src="../images/arrow-backward.png" alt="Back">
                </div>

            </div>

            <!-- Sound effects -->
            <audio id="sfx-correct" src="../audio/correct.mp3" preload="auto"></audio>
            <audio id="sfx-wrong" src="../audio/wrong.mp3" preload="auto"></audio>

        </div>
    </div>
    <script>
        (() => {
            const LESSON_KEY = 'lesson4';
            const RETURN_URL = 'dafs.html#page11';
            const RETURN_DIRECTION = 'back';
            const FEEDBACK_DURATION_MS = 1800;
            let answerLocked = false;

            const panel = document.getElementById('l1-feedback-panel');
            const icon = document.getElementById('l1-feedback-icon');
            const title = document.getElementById('l1-feedback-title');
            const sub = document.getElementById('l1-feedback-sub');
            const choices = Array.from(document.querySelectorAll('.lesson-choice-circle'));
            const navBtn = document.querySelector('.home-btn');

            function safeNavigate(url, direction) {
                if (!url) return;
                if (typeof window.navigateWithSlide === 'function') {
                    window.navigateWithSlide(url, direction);
                    return;
                }
                window.location.href = url;
            }

            function persistLessonState(isCorrect) {
                try {
                    if (isCorrect) {
                        localStorage.setItem(`${LESSON_KEY}_done`, '1');
                        localStorage.removeItem(`${LESSON_KEY}_wrong`);
                    } else {
                        localStorage.setItem(`${LESSON_KEY}_wrong`, '1');
                        localStorage.removeItem(`${LESSON_KEY}_done`);
                    }
                } catch (error) {
                    console.warn('Could not save lesson progress:', error);
                }
            }

            function playFeedbackSfx(isCorrect) {
                const sfx = document.getElementById(isCorrect ? 'sfx-correct' : 'sfx-wrong');
                if (!sfx) return;

                sfx.currentTime = 0;
                const playPromise = sfx.play();
                if (playPromise && typeof playPromise.catch === 'function') {
                    playPromise.catch(() => { });
                }
            }

            function clearChoiceStyles() {
                choices.forEach(choice => {
                    choice.style.outline = 'none';
                    choice.style.filter = 'none';
                });
            }

            function showFeedback(el, isCorrect) {
                if (!el) return;

                if (panel && icon && title && sub) {
                    panel.className = `lesson-feedback-panel show ${isCorrect ? 'correct' : 'wrong'}`;
                    icon.textContent = isCorrect ? String.fromCodePoint(0x1f31f) : String.fromCodePoint(0x1f60a);
                    title.textContent = isCorrect ? 'Tama!' : 'Subukan Muli!';
                    sub.textContent = isCorrect ? 'Napakagaling mo!' : 'Kaya mo yan, try ulit!';
                }

                el.style.outline = isCorrect ? '6px solid #2ecc71' : '6px solid #e74c3c';
                el.style.filter = isCorrect ? 'brightness(1.15)' : 'brightness(0.85)';
            }

            function closeFeedback(el, isCorrect) {
                if (panel) {
                    panel.classList.remove('show');
                }
                el.style.outline = 'none';
                el.style.filter = 'none';
                persistLessonState(isCorrect);
                safeNavigate(RETURN_URL, RETURN_DIRECTION);
            }

            function handleAnswer(el, isCorrect) {
                if (answerLocked || !el) return;
                answerLocked = true;

                clearChoiceStyles();
                playFeedbackSfx(isCorrect);
                showFeedback(el, isCorrect);

                // Bind close button
                const closeBtn = document.getElementById('l1-feedback-close');
                if (closeBtn) {
                    closeBtn.onclick = () => closeFeedback(el, isCorrect);
                }
            }

            function bindActivate(target, callback) {
                if (!target || typeof callback !== 'function') return;
                target.addEventListener('click', callback);
                target.addEventListener('keydown', event => {
                    if (event.key === 'Enter' || event.key === ' ') {
                        event.preventDefault();
                        callback();
                    }
                });
            }

            choices.forEach(choice => {
                bindActivate(choice, () => {
                    const isCorrect = choice.dataset.correct === 'true';
                    handleAnswer(choice, isCorrect);
                });
            });

            bindActivate(navBtn, () => {
                const targetUrl = navBtn && navBtn.dataset ? navBtn.dataset.target : '';
                const direction = navBtn && navBtn.dataset ? navBtn.dataset.direction : RETURN_DIRECTION;
                safeNavigate(targetUrl || RETURN_URL, direction || RETURN_DIRECTION);
            });

            window.checkAnswer = (el, isCorrect) => {
                handleAnswer(el, Boolean(isCorrect));
            };
        })();
    </script>
</body>

</html>
